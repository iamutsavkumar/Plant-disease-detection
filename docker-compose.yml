version: "3.9"

services:
  # ── FastAPI AI Inference Server ───────────────────────────────────────────
  ai-server:
    build:
      context: ./ai-server
      dockerfile: Dockerfile
    container_name: plantmd_ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./ai-server/model:/app/model:ro   # mount trained model read-only
    environment:
      - PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - plantmd_net

  # ── Node.js Express Backend ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: plantmd_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - AI_SERVER=http://ai-server:8000
      - NODE_ENV=production
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      ai-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - plantmd_net

  # ── React + Vite Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: plantmd_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - plantmd_net

networks:
  plantmd_net:
    driver: bridge
